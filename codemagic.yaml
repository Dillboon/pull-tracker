workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      node: 20.18.0
      java: 17
      android_signing:
        - cabletrack
      vars:
        PACKAGE_NAME: "com.cabletrack.app"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Clean Android directory
        script: rm -rf android
      - name: Expo prebuild
        script: npx expo prebuild --platform android --no-install
      - name: Set target SDK to 35
        script: |
          # Update all build.gradle files recursively to force API 35
          find android -name "build.gradle" -exec perl -i -pe 's/targetSdkVersion\s*=\s*\d+/targetSdkVersion = 35/g' {} +
          find android -name "build.gradle" -exec perl -i -pe 's/compileSdkVersion\s*=\s*\d+/compileSdkVersion = 35/g' {} +
          find android -name "build.gradle" -exec perl -i -pe 's/targetSdk\s*=\s*\d+/targetSdk = 35/g' {} +
          find android -name "build.gradle" -exec perl -i -pe 's/compileSdk\s*=\s*\d+/compileSdk = 35/g' {} +
          
          # Update gradle.properties if versions are declared there
          if [ -f android/gradle.properties ]; then
            perl -i -pe 's/android.targetSdkVersion\s*=\s*\d+/android.targetSdkVersion=35/g' android/gradle.properties
            perl -i -pe 's/android.compileSdkVersion\s*=\s*\d+/android.compileSdkVersion=35/g' android/gradle.properties
          fi
      - name: Set up keystore
        script: |
          echo "storeFile=$CM_KEYSTORE_PATH" >> android/gradle.properties
          echo "storePassword=$CM_KEYSTORE_PASSWORD" >> android/gradle.properties
          echo "keyAlias=$CM_KEY_ALIAS" >> android/gradle.properties
          echo "keyPassword=$CM_KEY_PASSWORD" >> android/gradle.properties
      - name: Configure release signing in build.gradle
        script: |
          cd android/app
          cat >> build.gradle << 'GRADLE'

          android {
              signingConfigs {
                  release {
                      storeFile file(project.property("storeFile"))
                      storePassword project.property("storePassword")
                      keyAlias project.property("keyAlias")
                      keyPassword project.property("keyPassword")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          GRADLE
      - name: Build Android AAB
        script: cd android && chmod +x gradlew && ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/app-release.aab